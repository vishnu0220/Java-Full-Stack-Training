<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registration App using MVC</title>
</head>
<body>
	<h2>Register to proceed further!</h2>
	<form method="post" action="./Register">
		<table>
			<tr>
				<td> User name </td>
				<td> <input type="text" name="uname"></td>
			</tr>
			<tr>
				<td> Email id </td>
				<td> <input type="text" name="uemail"></td>
			</tr>
			<tr>
				<td> Password</td>
				<td> <input type="password" name="upass"></td>
			</tr>
			<tr>
				<td> User city </td>
				<td> <input type="text" name="ucity"></td>
			</tr>
			<tr>
				<td> <button type="submit" value="Sign Up">Sign Up</button>
			</tr>
		</table>
	</form>
</body>
</html>
